# Serbia — API Infrastructure (3 Operators)
# Extracted from decompiled APKs + DNS recon
# Date: 2026-07-11

## YETTEL (rs.telenor.mymenu v2.20)
# Auth: OAuth2 PKCE via Google Sign-In
# Stack: FrontEngine (PanRobotics) + Retrofit + OkHttp

api_endpoints:
  base_url: https://api.yettel.rs/yettel
  resource: POST /api/resource?device_identifier=
  widgets: GET /api/widget/{1,3,4,5}
  login_init: POST /api/login/init
  legacy: GET /oldyettel/?q=widget&level={2,3,4}
  auth: GET https://www.yettel.rs/nalog/api/auth
  staging_auth: GET https://www.yettel.rs/staging/nalog/api/auth
  test_env: https://api.yettel.rs/test-yettel/api/resource?device_identifier=
  frontengine: https://fetest.panrobotics.com/yettel/
  app_url: https://yettel.rs/app/
  browser_url: https://yettel.rs/browser/

oauth2:
  grant_type: authorization_code
  client_id: [from google-services.json - in R.java]
  code_challenge_method: S256
  redirect_uri: [app-specific]

# Infrastructure DNS
dns:
  api.yettel.rs: 217.65.192.129
  remote.yettel.rs: 217.65.192.223
  citrix.yettel.rs: 217.65.192.231
  mms.yettel.rs: 217.65.192.6
  acs.cetin.rs: 85.162.11.196:10302  # TR-069 ACS

# Citrix Gateway
citrix:
  type: NetScaler AAA
  login: /logon/LogonPoint/tmindex.html
  nitro_api: /nitro/v1/config/
  apache_server: true


## A1 SRBIJA (rs.vipmobile.mojvip2)
# Auth: OAuth2 PKCE
# Stack: Retrofit + Firebase + Braze + AppsFlyer + Amplitude

api_endpoints:
  base_url: https://api.a1.rs
  usage: GET /v1/account/usage
  sso_init: POST /v1/sso/init
  oauth: GET /v1/oauth/authorize
  me: GET /v1/me
  devices: GET /v1/devices
  bills: GET /v1/bills
  products: GET /v1/products
  location: [internal - ACCESS_FINE_LOCATION permission]

firebase:
  project: a1-srbija-app
  analytics: enabled
  crashlytics: enabled

analytics:
  - braze
  - appsflyer
  - amplitude
  - facebook
  - google_analytics


## mt:s / TELEKOM SRBIJA (rs.telekom.mojmts)
# Auth: Firebase Auth + Google Sign-In + DataDome
# Stack: Retrofit + Firebase + Google Maps + Location Services

api_endpoints:
  base_url: https://api.mojmts.telekom.rs
  me: GET /api/me
  devices: GET /api/devices
  usage: GET /api/usage
  bills: GET /api/bills
  portal: https://my.mts.rs/api/

firebase:
  project: serbia-tracker-test
  api_key: [redacted in config]
  analytics: enabled

protection:
  - datadome  # Bot protection
  - cloudflare

location_permissions:
  - ACCESS_FINE_LOCATION
  - ACCESS_COARSE_LOCATION
  - ACCESS_BACKGROUND_LOCATION

google_maps_key: [in google-services.json]


## CROSS-OPERATOR INSIGHTS

# All 3 apps use OAuth2 PKCE flow
# All 3 request location permissions
# All 3 have Firebase analytics
# A1 has the most comprehensive API (17 endpoints found)
# mt:s has DataDome bot protection
# Yettel uses FrontEngine (PanRobotics) for their app framework

# Tower/coverage data extraction vectors:
# 1. /api/resource?device_identifier= endpoint may return cell info
# 2. Location services in all 3 apps could leak cell IDs
# 3. Legacy /oldyettel/?q=widget endpoints may have less auth
# 4. test-yettel environment may have weaker auth
# 5. FrontEngine test server at fetest.panrobotics.com
